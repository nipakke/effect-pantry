name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: '.node-version'
          cache: true

      - run: vp install
      - run: vp check

  test:
    name: Build & Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        node: [22, 24, 26]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-node${{ matrix.node }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-node${{ matrix.node }}-

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ matrix.node }}
          cache: true

      - run: vp install
      - run: corepack enable
      - run: pnpm build
      - run: pnpm test

  test-ok:
    name: Tests OK
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - if: ${{ needs.test.result != 'success' }}
        run: exit 1
      - run: echo "All matrix jobs passed"
