version: 2
updates:
  # ── npm/pnpm dependencies (root + all workspace packages) ────────
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Paris'
    open-pull-requests-limit: 10
    versioning-strategy: increase
    groups:
      effect:
        patterns:
          - 'effect'
          - '@effect/*'
        update-types:
          - 'minor'
          - 'patch'
      tooling:
        patterns:
          - 'vite-plus'
          - '@voidzero-dev/*'
          - 'vitest'
          - '@vitest/*'
          - 'typescript'
          - '@changesets/*'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'npm'
    directory: '/packages/watch-fs'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Paris'
    open-pull-requests-limit: 5
    versioning-strategy: increase
    groups:
      effect:
        patterns:
          - 'effect'
          - '@effect/*'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'npm'
    directory: '/tooling/vite-config'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Paris'
    open-pull-requests-limit: 3

  # ── GitHub Actions ────────────────────────────────────────────────
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Paris'
    open-pull-requests-limit: 5
